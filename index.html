<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Preparations</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --secondary: #64748b;
            --border: #e2e8f0;
            --hover: #f1f5f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --card-bg: #1e293b;
                --primary: #3b82f6;
                --secondary: #94a3b8;
                --border: #334155;
                --hover: #334155;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            color: var(--primary);
        }

        .card p {
            margin: 0;
            color: var(--secondary);
            font-size: 0.95rem;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meeting Preparations</h1>
        <p class="subtitle">Select a meeting prep dashboard to view</p>
        <div class="grid">

            <a href="Meeting%20Prep%20-%20Rakuten/index.html" class="card">
                <div class="icon">📊</div>
                <h2>Rakuten</h2>
                <p>View dashboard and generated artifacts</p>
            </a>

            <a href="Meeting%20Prep%20-%20SoftBank/index.html" class="card">
                <div class="icon">📊</div>
                <h2>SoftBank</h2>
                <p>View dashboard and generated artifacts</p>
            </a>

            <a href="Meeting%20Prep%20-%20Technetix/index.html" class="card">
                <div class="icon">📊</div>
                <h2>Technetix</h2>
                <p>View dashboard and generated artifacts</p>
            </a>

        </div>
    </div>
</body>
</html>
